name: Release Desktop Bundles

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-desktop:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: nyro-desktop-linux-bundle
            bundles: appimage,deb
          - os: macos-latest
            artifact_name: nyro-desktop-macos-bundle
            bundles: app,dmg
          - os: windows-latest
            artifact_name: nyro-desktop-windows-bundle
            bundles: nsis,msi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: pnpm -C webui install --frozen-lockfile

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build desktop bundles
        run: cargo tauri build --manifest-path src-tauri/Cargo.toml --bundles ${{ matrix.bundles }}
        env:
          # Optional: enable macOS signing/notarization when secrets are configured.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Optional placeholders for custom Windows signing pipeline.
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

      - name: Upload desktop bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/release/bundle/**
          if-no-files-found: error

  checksums:
    runs-on: ubuntu-latest
    needs: build-desktop

    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: nyro-desktop-*

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          find . -type f ! -name "SHA256SUMS.txt" -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Upload desktop SHA256SUMS
        uses: actions/upload-artifact@v4
        with:
          name: nyro-desktop-sha256sums
          path: artifacts/SHA256SUMS.txt
